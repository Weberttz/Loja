<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 max-auto rounded border p-4 m-4">
                <h2 class="text-center mb-5"> Novo Produto </h2>
                <form method="post" enctype="multipart/form-data" th:object="${produtoDto}">
                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label"> Nome </label>
                        <div class="col-sm-8">
                            <input class="form-control" th:field="${produtoDto.nome}">
                            <p th:if="${#fields.hasErrors('nome')}" th:errorclass="text-danger"
                                th:errors="${produtoDto.nome}"></p>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label"> Marca </label>
                        <div class="col-sm-8">
                            <input class="form-control" th:field="${produtoDto.marca}">
                            <p th:if="${#fields.hasErrors('marca')}" th:errorclass="text-danger"
                               th:errors="${produtoDto.marca}"></p>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label"> Categoria </label>
                        <div class="col-sm-8">
                            <select class="form-select" th:field="${produtoDto.categoria}">
                                <option value='Outro'>Outro</option>
                                <option value='Telefones'>Telefones</option>
                                <option value='Computadores'>Computadores</option>
                                <option value='Acessorios'>Acessórios</option>
                                <option value='Impressoras'>Impressoras</option>
                                <option value="Cameras">Câmeras</option>
                            </select>
                            <p th:if="${#fields.hasErrors('categoria')}" th:errorclass="text-danger"
                               th:errors="${produtoDto.categoria}"></p>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label">Preço</label>
                        <div class="col-sm-8">
                            <input class="form-control" type="number" step="0.01" min="0" th:field="${produtoDto.preco}">
                            <p th:if="${#fields.hasErrors('preco')}" th:errorclass="text-danger"
                               th:errors="${produtoDto.preco}"></p>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label">Descrição</label>
                        <div class="col-sm-8">
                            <textarea class="form-control" th:field="${produtoDto.descricao}"></textarea>
                            <p th:if="${#fields.hasErrors('descricao')}" th:errorclass="text-danger"
                               th:errors="${produtoDto.descricao}"></p>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label">Imagem</label>
                        <div class="col-sm-8">
                            <input class="form-control" type="file" th:field="${produtoDto.arquivoDeImagem}">
                            <p th:if="${#fields.hasErrors('arquivoDeImagem')}" th:errorclass="text-danger"
                               th:errors="${produtoDto.arquivoDeImagem}"></p>
                        </div>
                    </div>

                    <div class="row">
                        <div class="offset-sm-4 col-sm-4 d-grid">
                            <button type="submit" class="btn btn-primary"> Criar</button>
                        </div>
                        <div class="col-sm-4 d-grid">
                            <a class="btn btn-outline-primary" href="/produtos" role="button">Cancelar</a>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
